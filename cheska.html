<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reading References</title>
</head>
<body>

  <h3>Select the reading references you usually use:</h3>

  <form>
    <input type="checkbox" id="books" name="reference" value="Books">
    <label for="books">Books</label><br>

    <input type="checkbox" id="ebooks" name="reference" value="E-books">
    <label for="ebooks">E-books</label><br>

    <input type="checkbox" id="modules" name="reference" value="Modules">
    <label for="modules">Modules</label><br>

    <input type="checkbox" id="journals" name="reference" value="Journals">
    <label for="journals">Journals</label><br>

    <input type="checkbox" id="articles" name="reference" value="Articles">
    <label for="articles">Articles</label><br>

    <input type="checkbox" id="websites" name="reference" value="Websites">
    <label for="websites">Websites</label><br>

    <input type="checkbox" id="newspapers" name="reference" value="Newspapers">
    <label for="newspapers">Newspapers</label><br>
  </form>

</body>
</html>
